<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Result</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0a2e3f,#06202c);
  padding:20px;
}

.container{
  max-width:1000px;
  margin:auto;
  background:white;
  border-radius:30px;
  padding:30px;
  box-shadow:0 40px 70px rgba(0,0,0,0.3);
}

.header{text-align:center;margin-bottom:20px;}
.header h1{
  background:linear-gradient(45deg,#f4a261,#ffd700);
  -webkit-background-clip:text;
  color:transparent;
}

.top{
  background:#fff3cd;
  padding:15px;
  border-radius:18px;
  text-align:center;
  margin-bottom:20px;
  font-weight:bold;
}

table{width:100%;border-collapse:collapse;}
th{background:#2a6f8f;color:white;padding:12px;}
td{padding:10px;text-align:center;border-bottom:1px solid #eee;}

.gold{background:#fff8dc;}
.silver{background:#f1f3f5;}
.bronze{background:#ffe5b4;}

button{
  width:100%;
  margin-top:20px;
  padding:15px;
  background:#e67e22;
  color:white;
  border:none;
  border-radius:50px;
  font-size:18px;
  cursor:pointer;
}

.footer{text-align:center;margin-top:15px;color:#666;}
</style>
</head>

<body>

<div class="container" id="report">

  <div class="header">
    <h1>🕌 ഹിമായത്തുൽ ഇസ്ലാം മദ്രസ</h1>
    <p>ഇസ്ലാമിക് ക്വിസ് ഫൈനൽ റിസൾട്ട്</p>
  </div>

  <div class="top" id="topStudent">Loading...</div>

  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>Student</th>
        <th>Score</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <button onclick="downloadPDF()">⬇ Download PDF</button>

  <div class="footer">
    അധ്യാപകൻ: മുഹമ്മദ് അബ്ദുൽ ഫത്താഹ് ദാരിമി
  </div>

</div>

<!-- FIREBASE SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDgiwkJWr4vshVu-qv81Y6M52mdj50pJqU",
  authDomain: "kntcompany-f19e1.firebaseapp.com",
  projectId: "kntcompany-f19e1",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ STUDENTS
const STUDENTS = [
"മുഹമ്മദ് സയാൻ","ഹാദി സിനാൻ","മുഹമ്മദ് റസിൻ",
"മുഹമ്മദ് അമീൻ","മുഹമ്മദ് നഹിയാൻ","ഇയാസ് മുബാറക്",
"ഹൈറ ഫാത്തിമ","ഹന്ന ഫാത്തിമ","ലിയ മെഹറിൻ",
"ഫാത്തിമ ഹയ","ആയിഷ മെഹറിൻ"
];

// 🔥 LOAD FROM FIRESTORE
async function loadScores(){

  let scores = {};

  try{
    const ref = doc(db, "quizScores", "studentMarks");
    const snap = await getDoc(ref);

    if(snap.exists()){
      scores = snap.data().scores || {};
    }

  }catch(e){
    console.log("Firestore error", e);
  }

  // ✅ ensure all students exist
  STUDENTS.forEach(name=>{
    if(scores[name] === undefined){
      scores[name] = 0;
    }
  });

  render(scores);
}

// 🎯 RENDER
function render(scores){

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  const sorted = Object.entries(scores)
    .sort((a,b)=>b[1]-a[1]);

  document.getElementById("topStudent").innerHTML =
    `🏆 ${sorted[0][0]} - ${sorted[0][1]} മാർക്ക്`;

  sorted.forEach((s,i)=>{

    let cls="", medal="";
    if(i===0){cls="gold"; medal="🥇";}
    else if(i===1){cls="silver"; medal="🥈";}
    else if(i===2){cls="bronze"; medal="🥉";}

    const tr = document.createElement("tr");
    tr.className = cls;

    tr.innerHTML = `
      <td>${i+1} ${medal}</td>
      <td>${s[0]}</td>
      <td>${s[1]}</td>
    `;

    tbody.appendChild(tr);
  });
}

// START
loadScores();

// 📄 PDF FUNCTION (outside module)
window.downloadPDF = async function(){
  const { jsPDF } = window.jspdf;

  const canvas = await html2canvas(document.getElementById("report"),{scale:2});
  const img = canvas.toDataURL("image/png");

  const pdf = new jsPDF('p','mm','a4');
  const width = 190;
  const height = canvas.height * width / canvas.width;

  pdf.addImage(img,'PNG',10,10,width,height);
  pdf.save("quiz-result.pdf");
}
</script>

<!-- PDF LIBS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</body>
</html>
